<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1079" cy="608" r="21" fill="#1565c0" opacity="0.11"/>
    <circle cx="1044" cy="662" r="47" fill="#1565c0" opacity="0.12"/>
    <circle cx="744" cy="533" r="67" fill="#1565c0" opacity="0.08"/>
    <circle cx="402" cy="136" r="68" fill="#1565c0" opacity="0.06"/>
    <circle cx="575" cy="-51" r="52" fill="#1565c0" opacity="0.13"/>
    <circle cx="592" cy="471" r="24" fill="#1565c0" opacity="0.07"/>
    <rect x="751" y="111" width="61" height="44" rx="8" fill="#0d47a1" opacity="0.07" transform="rotate(33, 1029, 331)"/>
    <rect x="-29" y="591" width="37" height="73" rx="8" fill="#0d47a1" opacity="0.13" transform="rotate(26, 1062, 96)"/>
    <rect x="1258" y="112" width="66" height="25" rx="8" fill="#0d47a1" opacity="0.13" transform="rotate(8, 698, 342)"/>
    <rect x="1191" y="151" width="36" height="44" rx="8" fill="#0d47a1" opacity="0.07" transform="rotate(29, 1029, -85)"/>
    <rect x="918" y="22" width="65" height="57" rx="8" fill="#0d47a1" opacity="0.06" transform="rotate(24, 773, 256)"/>
    <rect x="-56" y="359" width="56" height="26" rx="8" fill="#0d47a1" opacity="0.10" transform="rotate(3, 867, 149)"/>
    <rect x="553" y="547" width="75" height="84" rx="8" fill="#0d47a1" opacity="0.14" transform="rotate(40, 1276, 158)"/>
    <rect x="-25" y="521" width="32" height="25" rx="8" fill="#0d47a1" opacity="0.07" transform="rotate(2, 903, 246)"/>
    <polygon points="660,385 745,555 575,555" fill="#1565c0" opacity="0.05"/>
    <polygon points="528,90 563,160 493,160" fill="#1565c0" opacity="0.08"/>
    <polygon points="1068,52 1104,124 1032,124" fill="#1565c0" opacity="0.13"/>
    <polygon points="404,301 446,385 362,385" fill="#1565c0" opacity="0.09"/>

  <!-- Wave at bottom -->
  <path d="M0,590 C360,610 840,570 1200,590 L1200,630 L0,630Z" fill="#1565c0" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    구글 알고리즘 고신용 도메인 보증 카드 발급
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
     — 도메인 신용 한도
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
     구글 알고리즘 고신용 도메인 보증 카드 발급 — 도메인 신용 한도
  </text>
</svg>